# -------------------------------
# Common Environment Variables
# -------------------------------
x-splunk-env: &splunk-env
  SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
  SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
  SPLUNK_START_ARGS: "--accept-license"

# -------------------------------
# Common Enterprise Service Configuration
# -------------------------------
x-splunk-common: &splunk-common
  image: splunk/splunk:9.0.3-openjdk11
  restart: unless-stopped
  networks:
    - skynet
  tty: true
  stdin_open: true

# -------------------------------
# Common UF Service Config
# -------------------------------
x-splunk-uf-common: &splunk-uf-common
  image: splunk/universalforwarder:latest
  restart: unless-stopped
  networks:
    - skynet
  tty: true
  stdin_open: true

services:
  # -------------------------------
  # Deployment Server (DS)
  # -------------------------------
  ds1:
    <<: *splunk-common
    hostname: ds1
    ports:
      - "8001:8000"
    environment:
      <<: *splunk-env
    volumes:
      - ds1_etc:/opt/splunk/etc
      - ds1_var:/opt/splunk/var
      - ./ds1_apps_data:/opt/splunk/etc/deployment-apps

  # -------------------------------
  # Universal Forwarder (UF)
  # -------------------------------
  uf1:
    <<: *splunk-uf-common
    hostname: uf1
    environment:
      <<: *splunk-env
    volumes:
      - uf1_etc:/opt/splunkforwarder/etc
      - uf1_var:/opt/splunkforwarder/var

  # -------------------------------
  # Indexer
  # -------------------------------
  idx1:
    <<: *splunk-common
    hostname: idx1
    ports:
      - "8002:8000"
    environment:
      <<: *splunk-env
    volumes:
      - idx1_etc:/opt/splunk/etc
      - idx1_var:/opt/splunk/var

# -------------------------------
# Networks
# -------------------------------
networks:
  skynet:
    driver: bridge
    
# -------------------------------
# Named Volumes
# -------------------------------
volumes:
  ds1_etc:
  ds1_var:
  uf1_etc:
  uf1_var:
  idx1_etc:
  idx1_var:
